  const els = {

  const state = {
    lang: "fr",
    mode: "idle",
    activePeriod: 0,
    remaining: CONFIG.periodSeconds,
    running: false,
    pausedFromMode: null,
    timerEndAt: 0,
    intervalId: null,
    audioCtx: null,
    ipadMode: false,
    overlayTimeout: null,
    speechEnabled: true,
    selectedVoice: null,
    spokenMarks: new Set()
  };

  function t(key, ...args) {
    const value = TEXT[state.lang][key];
    return typeof value === "function" ? value(...args) : value;
  }

  function setStatus(label, detail, live = false) {
    els.statusLabel.textContent = label;
    els.statusDetail.textContent = detail;
    els.signalDot.style.background = live ? "var(--gold)" : "#64748b";
    els.signalDot.style.boxShadow = live
      ? "0 0 0 10px rgba(212,175,55,.12), 0 0 28px rgba(212,175,55,.24)"
      : "none";
  }

  function setPhase(text) {
    els.phaseLabel.textContent = text;
  }

  function setSub(text) {
    els.subDisplay.textContent = text;
  }

  function formatTime(totalSeconds) {
    const s = Math.max(0, Math.ceil(totalSeconds));
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  }

  function renderTime(seconds) {
    els.timerDisplay.textContent = formatTime(seconds);
  }

  function flashTimer() {
    els.timerCard.classList.remove("flash");
    void els.timerCard.offsetWidth;
    els.timerCard.classList.add("flash");
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function stopInterval() {
    if (state.intervalId) {
      clearInterval(state.intervalId);
      state.intervalId = null;
    }
  }

  function clearOverlayTimeout() {
    if (state.overlayTimeout) {
      clearTimeout(state.overlayTimeout);
      state.overlayTimeout = null;
    }
  }

  function showOverlay(title, sub, duration = 1200, style = "normal") {
    clearOverlayTimeout();
    els.overlayKicker.textContent = t("overlayOfficial");
    els.overlayTitle.textContent = title;
    els.overlaySub.textContent = sub;
    els.overlay.classList.remove("pause-style", "final-style");
    if (style === "pause") els.overlay.classList.add("pause-style");
    if (style === "final") els.overlay.classList.add("final-style");
    els.overlay.classList.add("show");

    return new Promise(resolve => {
      state.overlayTimeout = setTimeout(() => {
        els.overlay.classList.remove("show", "pause-style", "final-style");
        state.overlayTimeout = null;
        resolve();
      }, duration);
    });
  }

  function updateButtons() {
    const active = ["intro", "countdown", "period", "break", "overtime"].includes(state.mode);
    const paused = state.mode === "paused";
    const finished = state.mode === "finished";

    els.startBtn.disabled = active || paused;
    els.pauseBtn.disabled = !(active && state.running);
    els.resumeBtn.disabled = !paused;
    els.otBtn.disabled = !(finished || state.mode === "idle");
  }

  function setMode(mode) {
    state.mode = mode;
    updateButtons();
  }

  function updatePeriodBoxes() {
    const boxes = [
      [els.p1, els.p1t, 1],
      [els.p2, els.p2t, 2],
      [els.p3, els.p3t, 3],
      [els.p4, els.p4t, 4]
    ];

    for (const [box, label, n] of boxes) {
      box.classList.remove("pending", "active", "done");

      if (state.mode === "period" && state.activePeriod === n) {
        box.classList.add("active");
        label.textContent = t("active");
      } else if (state.activePeriod > n || state.mode === "overtime" || state.mode === "finished") {
        box.classList.add("done");
        label.textContent = t("done");
      } else {
        box.classList.add("pending");
        label.textContent = t("pending");
      }
    }

    if (state.mode === "idle") {
      boxes.forEach(([box, label]) => {
        box.classList.remove("active", "done");
        box.classList.add("pending");
        label.textContent = t("pending");
      });
    }

    if (state.mode === "break" || state.mode === "countdown") {
      const next = state.mode === "break" ? state.activePeriod + 1 : state.activePeriod;
      boxes.forEach(([box, label, n]) => {
        if (n < next) {
          box.classList.remove("pending", "active");
          box.classList.add("done");
          label.textContent = t("done");
        } else if (n === next && state.mode !== "idle") {
          box.classList.remove("pending", "done");
          box.classList.add("active");
          label.textContent = t("pending");
        }
      });
    }
  }

  function applyLanguageUI() {
    els.subtitleText.textContent = t("subtitle");
    els.periodsTitle.textContent = t("periods");
    els.legendTitle.textContent = t("state");
    els.infoTitle.textContent = t("infos");
    els.legend1.textContent = t("legend1");
    els.legend2.textContent = t("legend2");
    els.legend3.textContent = t("legend3");
    els.info1.textContent = t("info1");
    els.info2.textContent = t("info2");
    els.info3.textContent = t("info3");
    els.info4.textContent = t("info4");
    els.footerText.textContent = t("footer");

    els.testBtn.textContent = t("test");
    els.startBtn.textContent = t("start");
    els.pauseBtn.textContent = t("pause");
    els.resumeBtn.textContent = t("resume");
    els.otBtn.textContent = t("overtime");
    els.fsBtn.textContent = t("fullscreen");
    els.resetBtn.textContent = t("reset");

    els.modeBadge.textContent = state.ipadMode ? t("modeIpad") : t("modeStandard");

    els.frBtn.classList.toggle("active", state.lang === "fr");
    els.enBtn.classList.toggle("active", state.lang === "en");

    initVoices();

    if (state.mode === "idle") {
      setPhase(t("waiting"));
      setSub(t("notStarted"));
      setStatus(t("ready"), t("readyDetail"), false);
    }

    updatePeriodBoxes();
  }

  function resetDisplay() {
    state.activePeriod = 0;
    state.remaining = CONFIG.periodSeconds;
    state.spokenMarks = new Set();
    setMode("idle");
    renderTime(CONFIG.periodSeconds);
    setPhase(t("waiting"));
    setSub(t("notStarted"));
    setStatus(t("ready"), t("readyDetail"), false);
    els.audioBadge.textContent = t("audioUntested");
    updatePeriodBoxes();
  }

  function fullReset(force = false) {
    if (!force) {
      const ok = confirm(t("resetConfirm"));
      if (!ok) return;
    }
    stopInterval();
    stopSpeech();
    clearOverlayTimeout();
    els.overlay.classList.remove("show", "pause-style", "final-style");
    state.running = false;
    state.pausedFromMode = null;
    resetDisplay();
  }

  function initAudio() {
    if (state.audioCtx) return true;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    try {
      state.audioCtx = new AC();
      return true;
    } catch (e) {
      return false;
    }
  }

  function initVoices() {
    if (!("speechSynthesis" in window)) return;
    const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
    if (!voices.length) return;

    const preferred = state.lang === "fr"
      ? voices.find(v => /fr/i.test(v.lang) && /Thomas|Amelie|Audrey|Marie|Pauline|Siri/i.test(v.name))
        || voices.find(v => /fr/i.test(v.lang))
        || voices[0]
      : voices.find(v => /en/i.test(v.lang) && /Samantha|Daniel|Karen|Alex|Siri/i.test(v.name))
        || voices.find(v => /en/i.test(v.lang))
        || voices[0];

    state.selectedVoice = preferred || null;
  }

  function stopSpeech() {
    try {
      if ("speechSynthesis" in window) speechSynthesis.cancel();
    } catch (e) {}
  }

  function speak(text, priority = false, rate = 1.02, pitch = 1) {
    return new Promise(resolve => {
      if (!state.speechEnabled || !("speechSynthesis" in window) || !text) {
        resolve(false);
        return;
      }

      try {
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = state.selectedVoice || null;
        utter.lang = state.selectedVoice?.lang || (state.lang === "fr" ? "fr-FR" : "en-US");
        utter.rate = rate;
        utter.pitch = pitch;
        utter.volume = 1;

        utter.onend = () => resolve(true);
        utter.onerror = () => resolve(false);

        if (priority) speechSynthesis.cancel();
        speechSynthesis.speak(utter);
      } catch (e) {
        resolve(false);
      }
    });
  }

  async function unlockAudioAndVoice() {
    const ok = initAudio();
    initVoices();

    try {
      if (ok && state.audioCtx.state === "suspended") {
        await state.audioCtx.resume();
      }
      if ("speechSynthesis" in window) {
        speechSynthesis.cancel();
      }
      els.audioBadge.textContent = ok ? t("audioOk") : t("audioFail");
      return ok;
    } catch (e) {
      els.audioBadge.textContent = t("audioFail");
      return false;
    }
  }

  function playTone(freq = 880, duration = 0.18, gainValue = 0.35, type = "sine") {
    return new Promise(resolve => {
      if (!state.audioCtx) {
        resolve(false);
        return;
      }

      try {
        const ctx = state.audioCtx;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(3200, now);

        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + duration);

        setTimeout(() => resolve(true), duration * 1000 + 30);
      } catch (e) {
        resolve(false);
      }
    });
  }

  async function playStartBuzzer() {
    const a = await playTone(1050, 0.12, 0.42, "square");
    await wait(35);
    const b = await playTone(1300, 0.14, 0.46, "square");
    await wait(35);
    const c = await playTone(920, 0.38, 0.54, "sawtooth");
    return a || b || c;
  }

  async function playEndBuzzer() {
    const a = await playTone(820, 0.14, 0.42, "square");
    await wait(50);
    const b = await playTone(700, 0.14, 0.42, "square");
    await wait(50);
    const c = await playTone(560, 0.30, 0.50, "square");
    return a || b || c;
  }

  async function playFinalBuzzer() {
    const a = await playTone(1350, 0.12, 0.40, "square");
    await wait(45);
    const b = await playTone(1350, 0.12, 0.40, "square");
    await wait(60);
    const c = await playTone(760, 0.48, 0.58, "sawtooth");
    return a || b || c;
  }

  async function testSound() {
    await unlockAudioAndVoice();
    await showOverlay(t("testing"), "3 · 2 · 1", 700);
    await playTone(900, 0.16, 0.35, "sine");
    await wait(70);
    await playTone(1100, 0.18, 0.40, "square");
    await wait(70);
    await speak(state.lang === "fr" ? "Test de la voix." : "Voice test.", true, 1.02);
    const played = await playFinalBuzzer();
    els.audioBadge.textContent = played ? t("audioOk") : t("audioFail");
  }

  function startTimer(seconds, mode, onComplete, onTick) {
    stopInterval();
    state.running = true;
    state.remaining = seconds;
    state.timerEndAt = performance.now() + seconds * 1000;
    setMode(mode);

    state.intervalId = setInterval(() => {
      const remainingMs = state.timerEndAt - performance.now();
      const remainingSec = Math.max(0, remainingMs / 1000);
      state.remaining = remainingSec;

      if (onTick) onTick(remainingSec);

      if (remainingSec <= 0.02) {
        stopInterval();
        state.running = false;
        onComplete();
      }
    }, CONFIG.tickMs);
  }

  async function runIntro() {
    await unlockAudioAndVoice();

    state.activePeriod = 0;
    state.running = false;
    state.spokenMarks = new Set();

    setMode("intro");
    setPhase(t("introPhase"));
    setSub(t("introSub"));
    setStatus(t("introStatus"), t("introDetail"), true);
    updatePeriodBoxes();

    await showOverlay(t("overlayWelcomeTitle"), t("overlayWelcomeSub"), 1800);
    await startLeadCountdown(CONFIG.firstLeadSeconds, 1, true);
  }

  async function startLeadCountdown(totalSeconds, periodNumber, firstStart = false) {
    state.activePeriod = periodNumber;
    state.spokenMarks = new Set();

    setMode("countdown");
    setPhase(firstStart ? t("introPhase") : t("breakTitle"));
    setSub(firstStart ? "00:30 avant le départ" : "00:20 avant la reprise");
    setStatus(
      firstStart ? t("introStatus") : t("breakStatus"),
      firstStart ? t("introDetail") : t("breakDetail", periodNumber - 1),
      true
    );
    updatePeriodBoxes();

    const openingSpeech = firstStart ? t("startSpeech30") : t("resumeSpeech20");
    const openingOverlayTitle = firstStart ? t("overlayWelcomeTitle") : t("overlayBreakTitle");
    const openingOverlaySub = firstStart ? openingSpeech : openingSpeech;

    await speak(openingSpeech, true, 1.0);
    await showOverlay(openingOverlayTitle, openingOverlaySub, 1400, firstStart ? "normal" : "pause");

    startTimer(
      totalSeconds,
      "countdown",
      async () => {
        const played = await playStartBuzzer();
        els.audioBadge.textContent = played ? t("audioOk") : t("audioFail");
        await speak(t("periodTitle", periodNumber), true, 1.05);
        await showOverlay(t("periodTitle", periodNumber), t("periodSub", periodNumber), 900);
        startPeriod(periodNumber);
      },
      (remainingSec) => {
        const sec = Math.ceil(remainingSec);

        if (sec > 10) {
          renderTime(sec);
          setSub(firstStart ? `${formatTime(sec)} avant le départ` : `${formatTime(sec)} avant la reprise`);
        } else if (sec >= 1) {
          els.timerDisplay.textContent = String(sec);
          setSub(firstStart ? "Décompte officiel" : "Reprise imminente");
          flashTimer();

          if (!state.spokenMarks.has(`n${sec}`)) {
            state.spokenMarks.add(`n${sec}`);
            speak(String(sec), true, 1.06);
            showOverlay(String(sec), firstStart ? "Avant le lancement" : "Reprise du jeu", 550, firstStart ? "normal" : "pause");
          }
        }
      }
    );
  }

  function startPeriod(periodNumber) {
    state.activePeriod = periodNumber;
    setPhase(t("periodTitle", periodNumber));
    setSub(t("periodSub", periodNumber));
    setStatus(t("periodStatus", periodNumber), t("periodDetail"), true);
    updatePeriodBoxes();

    startTimer(
      CONFIG.periodSeconds,
      "period",
      async () => {
        await onPeriodEnd(periodNumber);
      },
      (remainingSec) => {
        renderTime(remainingSec);
      }
    );
  }

  async function onPeriodEnd(periodNumber) {
    const played = await playEndBuzzer();
    els.audioBadge.textContent = played ? t("audioOk") : t("audioFail");

    await speak(t("endPeriodSpeech"), true, 1.0);
    await showOverlay(
      state.lang === "fr" ? `Fin période ${periodNumber}` : `End period ${periodNumber}`,
      t("endPeriodSpeech"),
      1500,
      "pause"
    );

    if (periodNumber < CONFIG.totalPeriods) {
      await startBreak(periodNumber);
    } else {
      await finishMatch();
    }
  }

  async function startBreak(completedPeriod) {
    state.activePeriod = completedPeriod;
    state.spokenMarks = new Set();

    setPhase(t("breakTitle"));
    setSub(t("breakSub", completedPeriod));
    setStatus(t("breakStatus"), t("breakDetail", completedPeriod), true);
    updatePeriodBoxes();

    startTimer(
      CONFIG.breakSeconds,
      "break",
      async () => {
        await startLeadCountdown(CONFIG.resumeLeadSeconds, completedPeriod + 1, false);
      },
      (remainingSec) => {
        const sec = Math.ceil(remainingSec);
        renderTime(remainingSec);

        if (sec > CONFIG.resumeLeadSeconds) {
          setSub(`${formatTime(sec)} de repos restant`);
        } else {
          setSub(`${formatTime(sec)} avant la reprise`);
        }
      }
    );
  }

  async function finishMatch() {
    const played = await playFinalBuzzer();
    els.audioBadge.textContent = played ? t("audioOk") : t("audioFail");

    setMode("finished");
    renderTime(0);
    setPhase(t("finishTitle"));
    setSub(t("finishSub"));
    setStatus(t("finishStatus"), t("finishDetail"), false);
    updatePeriodBoxes();

    await speak(t("finalSpeech"), true, 1.0);
    await showOverlay(t("overlayFinalTitle"), t("finalSpeech"), 2600, "final");
  }

  async function startOvertime() {
    await unlockAudioAndVoice();

    state.activePeriod = 4;
    setPhase(t("overtimeTitle"));
    setSub(t("overtimeSub"));
    setStatus(t("overtimeStatus"), t("overtimeDetail"), true);
    updatePeriodBoxes();

    await speak(t("overtimeStartSpeech"), true, 1.0);
    await showOverlay(t("overtimeTitle"), t("overtimeStartSpeech"), 1500);

    startTimer(
      CONFIG.overtimeSeconds,
      "overtime",
      async () => {
        const done = await playFinalBuzzer();
        els.audioBadge.textContent = done ? t("audioOk") : t("audioFail");
        setMode("finished");
        setPhase(t("overtimeDoneTitle"));
        setSub(t("overtimeDoneSub"));
        setStatus(t("finishStatus"), t("finishDetail"), false);
        await speak(t("overtimeEndSpeech"), true, 1.0);
        await showOverlay(t("overtimeDoneTitle"), t("overtimeEndSpeech"), 1800, "final");
      },
      (remainingSec) => {
        renderTime(remainingSec);
      }
    );
  }

  function pauseFlow() {
    if (!state.running) return;
    stopInterval();
    stopSpeech();
    state.running = false;
    state.pausedFromMode = state.mode;
    setMode("paused");
    setStatus(t("pausedStatus"), t("pausedDetail"), false);
    setSub(t("pausedSub"));
  }

  function resumeFlow() {
    if (state.mode !== "paused" || !state.pausedFromMode) return;

    const modeToResume = state.pausedFromMode;
    const remaining = state.remaining;

    if (modeToResume === "period") {
      setPhase(t("periodTitle", state.activePeriod));
      setSub(t("periodSub", state.activePeriod));
      setStatus(t("periodStatus", state.activePeriod), t("periodDetail"), true);
      updatePeriodBoxes();

      startTimer(
        remaining,
        "period",
        async () => {
          await onPeriodEnd(state.activePeriod);
        },
        (remainingSec) => {
          renderTime(remainingSec);
        }
      );
      return;
    }

    if (modeToResume === "break") {
      setPhase(t("breakTitle"));
      setSub(t("breakSub", state.activePeriod));
      setStatus(t("breakStatus"), t("breakDetail", state.activePeriod), true);
      updatePeriodBoxes();

      startTimer(
        remaining,
        "break",
        async () => {
          await startLeadCountdown(CONFIG.resumeLeadSeconds, state.activePeriod + 1, false);
        },
        (remainingSec) => {
          renderTime(remainingSec);
          const sec = Math.ceil(remainingSec);
          if (sec > CONFIG.resumeLeadSeconds) {
            setSub(`${formatTime(sec)} de repos restant`);
          } else {
            setSub(`${formatTime(sec)} avant la reprise`);
          }
        }
      );
      return;
    }

    if (modeToResume === "countdown") {
      // Reprise simple : on relance un lead countdown adapté au temps restant.
      const targetPeriod = state.activePeriod || 1;
      const firstStart = targetPeriod === 1 && state.activePeriod === 1 && remaining > CONFIG.resumeLeadSeconds;
      startLeadCountdown(Math.max(1, Math.ceil(remaining)), targetPeriod, firstStart);
      return;
    }

    if (modeToResume === "overtime") {
      setPhase(t("overtimeTitle"));
      setSub(t("overtimeSub"));
      setStatus(t("overtimeStatus"), t("overtimeDetail"), true);
      updatePeriodBoxes();

      startTimer(
        remaining,
        "overtime",
        async () => {
          const done = await playFinalBuzzer();
          els.audioBadge.textContent = done ? t("audioOk") : t("audioFail");
          setMode("finished");
          setPhase(t("overtimeDoneTitle"));
          setSub(t("overtimeDoneSub"));
          setStatus(t("finishStatus"), t("finishDetail"), false);
          await speak(t("overtimeEndSpeech"), true, 1.0);
          await showOverlay(t("overtimeDoneTitle"), t("overtimeEndSpeech"), 1800, "final");
        },
        (remainingSec) => {
          renderTime(remainingSec);
        }
      );
    }
  }

  async function toggleFullscreen() {
    try {
      if (!document.fullscreenElement) {
        if (document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }
      } else if (document.exitFullscreen) {
        await document.exitFullscreen();
      }
    } catch (e) {}
  }

  function toggleIpadMode() {
    state.ipadMode = !state.ipadMode;
    els.app.classList.toggle("ipad-mode", state.ipadMode);
    els.ipadBtn.classList.toggle("active", state.ipadMode);
    els.modeBadge.textContent = state.ipadMode ? t("modeIpad") : t("modeStandard");
  }

  els.testBtn.addEventListener("click", async () => {
    await testSound();
  });

  els.startBtn.addEventListener("click", async () => {
    await runIntro();
  });

  els.pauseBtn.addEventListener("click", () => {
    pauseFlow();
  });

  els.resumeBtn.addEventListener("click", () => {
    resumeFlow();
  });

  els.otBtn.addEventListener("click", async () => {
    await startOvertime();
  });

  els.fsBtn.addEventListener("click", async () => {
    await toggleFullscreen();
  });

  els.resetBtn.addEventListener("click", () => {
    fullReset(false);
  });

  els.frBtn.addEventListener("click", () => {
    state.lang = "fr";
    applyLanguageUI();
  });

  els.enBtn.addEventListener("click", () => {
    state.lang = "en";
    applyLanguageUI();
  });

  els.ipadBtn.addEventListener("click", () => {
    toggleIpadMode();
  });

  document.addEventListener("visibilitychange", async () => {
    if (document.visibilityState === "visible" && state.audioCtx && state.audioCtx.state === "suspended") {
      try { await state.audioCtx.resume(); } catch (e) {}
    }
  });

  if ("speechSynthesis" in window) {
    initVoices();
    window.speechSynthesis.onvoiceschanged = initVoices;
  }

  resetDisplay();
  applyLanguageUI();
  updateButtons();
})();
</script>
